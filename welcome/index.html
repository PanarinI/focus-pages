<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ember is installed</title>
<style>
  :root{ --bg:#0d0a07; --warm:#e8b25c; --ink:#e8dcc8; --ink-dim:#8a7a63; }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:radial-gradient(120% 80% at 50% 0%, #1a1109 0%, var(--bg) 62%);
    color:var(--ink);
    font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex; flex-direction:column; align-items:center;
    padding:clamp(28px,6vh,64px) 20px 56px;
  }
  h1{
    display:flex; align-items:center; gap:16px;
    font-size:clamp(30px,4.6vw,44px); font-weight:600;
    letter-spacing:-.02em; margin:0 0 14px; text-align:center;
  }
  h1 svg{flex:none}
  .say{
    margin:0 0 clamp(26px,4vh,40px); text-align:center;
    font-size:clamp(16px,2.1vw,20px); color:var(--ink-dim); max-width:44ch;
  }
  .say b{color:var(--warm); font-weight:600}
  .shot{width:100%; max-width:940px; height:auto; display:block}
  .after{
    margin:clamp(26px,4vh,40px) 0 0; text-align:center;
    font-size:clamp(16px,2.1vw,19px); max-width:42ch;
  }
</style>
</head>
<body>

  <h1>
    <svg width="46" height="46" viewBox="0 0 64 64" aria-hidden="true">
      <defs><radialGradient id="glow">
        <stop offset="0%" stop-color="#ffd08a"/><stop offset="55%" stop-color="#e8912c"/><stop offset="100%" stop-color="#8c3f10"/>
      </radialGradient></defs>
      <circle cx="32" cy="32" r="13" fill="url(#glow)" style="filter:drop-shadow(0 0 11px rgba(255,160,60,.6))"/>
    </svg>
    Ember is installed
  </h1>

  <p class="say">Click the puzzle piece <b>(1)</b> in the top right of your browser, then click the pin <b>(2)</b> next to Ember:</p>

  <!-- Макет окна Chrome со шагами прямо на цели (паттерн эталонных WP метода) -->
  <svg class="shot" viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg" role="img"
       aria-label="Chrome toolbar: click the puzzle piece, then the pin next to Ember">
    <defs>
      <filter id="drop" x="-20%" y="-20%" width="140%" height="150%">
        <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000" flood-opacity=".28"/>
      </filter>
      <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
        <path d="M0 0.6 L8.4 4.5 L0 8.4 Z" fill="#d9531e"/>
      </marker>
    </defs>

    <!-- окно браузера -->
    <g filter="url(#drop)">
      <rect x="16" y="16" width="968" height="360" rx="13" fill="#ffffff"/>
      <path d="M16 29a13 13 0 0 1 13-13h942a13 13 0 0 1 13 13v33H16Z" fill="#dee1e6"/>
      <rect x="36" y="26" width="215" height="36" rx="9" fill="#fff"/>
      <path d="M233 39l10 10M243 39l-10 10" stroke="#5f6368" stroke-width="1.6" stroke-linecap="round" fill="none"/>
      <rect x="16" y="62" width="968" height="46" fill="#fff"/>
      <!-- навигация -->
      <g stroke="#5f6368" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M44 85h13M44 85l4.6-4.6M44 85l4.6 4.6"/>
        <path d="M92 85h-13M92 85l-4.6-4.6M92 85l-4.6 4.6" opacity=".38"/>
        <path d="M120 79.5a6.6 6.6 0 1 0 5 2.4M125 76v6.2h-6"/>
      </g>
      <rect x="152" y="72" width="440" height="27" rx="13.5" fill="#f1f3f4"/>
      <!-- иконки справа: пазл · боковая панель · профиль · меню -->
      <g fill="#5f6368">
        <path d="M690 76.6h5.6a2.7 2.7 0 1 1 4.9 0h5.6c.8 0 1.4.6 1.4 1.4v5a2.7 2.7 0 1 0 0 4.9v5c0 .8-.6 1.4-1.4 1.4h-5.6a2.7 2.7 0 1 0-4.9 0H690c-.8 0-1.4-.6-1.4-1.4v-5.6a2.7 2.7 0 1 1 0-4.9v-4.4c0-.8.6-1.4 1.4-1.4Z"/>
        <rect x="742" y="76" width="18" height="18" rx="3" fill="none" stroke="#5f6368" stroke-width="1.8"/>
        <line x1="754" y1="76" x2="754" y2="94" stroke="#5f6368" stroke-width="1.8"/>
        <circle cx="794" cy="85" r="9" fill="#5f6368" opacity=".85"/>
        <circle cx="828" cy="78.5" r="1.9"/><circle cx="828" cy="85" r="1.9"/><circle cx="828" cy="91.5" r="1.9"/>
      </g>
      <!-- попап Extensions -->
      <g>
        <rect x="600" y="120" width="336" height="176" rx="11" fill="#fff" filter="url(#drop)"/>
        <text x="622" y="150" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="16" fill="#202124">Extensions</text>
        <path d="M905 137l14 14M919 137l-14 14" stroke="#5f6368" stroke-width="1.7" stroke-linecap="round"/>
        <text x="622" y="180" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="12.5" font-weight="600" fill="#202124">No access needed</text>
        <text x="622" y="199" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="11.5" fill="#5f6368">These extensions don’t need to see and change</text>
        <text x="622" y="214" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="11.5" fill="#5f6368">information on this site.</text>
        <!-- строка нашего расширения -->
        <circle cx="631" cy="243" r="9.5" fill="#1a1109"/>
        <circle cx="631" cy="243" r="5" fill="url(#glow)"/>
        <text x="652" y="248" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13.5" fill="#202124">Ember</text>
        <path d="M885 235h10l-1.3 8.6 5 5.2v2.6h-17.4v-2.6l5-5.2L885 235Z" fill="none" stroke="#3c4043" stroke-width="1.7" stroke-linejoin="round"/>
        <path d="M888.7 251.4V259" stroke="#3c4043" stroke-width="1.7" stroke-linecap="round"/>
        <line x1="616" y1="270" x2="920" y2="270" stroke="#e8eaed" stroke-width="1.4"/>
        <g transform="translate(623,277)" stroke="#5f6368" fill="none" stroke-linecap="round">
          <circle cx="8" cy="8" r="4.1" stroke-width="1.5"/>
          <path d="M8 2.5v1.5M8 12v1.5M2.5 8h1.5M12 8h1.5M4.2 4.2l1.1 1.1M10.7 10.7l1.1 1.1M11.8 4.2l-1.1 1.1M5.3 10.7l-1.1 1.1" stroke-width="2.1"/>
        </g>
        <text x="652" y="290" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" fill="#3c4043">Manage Extensions</text>
      </g>
    </g>

    <!-- шаг 1: обводка пазла + стрелка + номер -->
    <circle cx="699" cy="85" r="19" fill="none" stroke="#d9531e" stroke-width="3.2"/>
    <path d="M646 85h26" stroke="#d9531e" stroke-width="3.2" fill="none" marker-end="url(#ah)"/>
    <circle cx="614" cy="85" r="25" fill="#fff" stroke="#d9531e" stroke-width="3.2"/>
    <text x="614" y="94" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,sans-serif"
          font-size="26" font-weight="700" fill="#d9531e">1</text>

    <!-- шаг 2: обводка пина + стрелка + номер -->
    <circle cx="889" cy="245" r="21" fill="none" stroke="#d9531e" stroke-width="3.2"/>
    <path d="M952 296q-14-26-40-38" stroke="#d9531e" stroke-width="3.2" fill="none" marker-end="url(#ah)"/>
    <circle cx="957" cy="322" r="25" fill="#fff" stroke="#d9531e" stroke-width="3.2"/>
    <text x="957" y="331" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,sans-serif"
          font-size="26" font-weight="700" fill="#d9531e">2</text>
  </svg>

  <p class="after">That’s it. Click the ember whenever you need to focus.</p>

</body>
</html>
